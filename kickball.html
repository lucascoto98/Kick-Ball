<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kick Game - Lucas & Francisco</title>
    <style>
        body { margin: 0; overflow: hidden; background: #2c3e50; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #game-container { width: 100vw; height: 100vh; position: relative; background: linear-gradient(#87CEEB, #2ecc71); display: none; }
        
        /* Menu Inicial */
        #menu { 
            width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.85); 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            color: white; text-align: center; z-index: 10;
        }

        .tutorial-box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #2ecc71; }
        
        button { 
            padding: 15px 40px; font-size: 22px; cursor: pointer; 
            background: #2ecc71; border: none; color: white; border-radius: 50px;
            font-weight: bold; transition: 0.3s; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }
        
        button:hover { transform: scale(1.1); background: #27ae60; }

        .devs { margin-top: 30px; font-size: 14px; opacity: 0.7; letter-spacing: 1px; }

        /* Jogo */
        #ball { 
            width: 80px; height: 80px; font-size: 60px;
            display: flex; align-items: center; justify-content: center;
            position: absolute; bottom: 50px; left: 50%;
            transform: translateX(-50%); cursor: pointer; touch-action: none;
            user-select: none;
        }

        #score { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 40px; color: white; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; }
    </style>
</head>
<body>

<div id="menu">
    <h1>KICK CHALLENGE ⚽</h1>
    <div class="tutorial-box">
        <h3>COMO JOGAR:</h3>
        <p>📱 <b>Telemóvel:</b> Toca na bola para a manter no ar.</p>
        <p>💻 <b>PC:</b> Clica com o rato na bola.</p>
        <p>⚠️ Não deixes a bola tocar no chão!</p>
    </div>
    <button onclick="startGame()">INICIAR JOGO</button>
    <div class="devs">Desenvolvedores: Lucas & Francisco</div>
</div>

<div id="game-container">
    <div id="score">0</div>
    <div id="ball">⚽</div>
</div>

<script>
    const menu = document.getElementById('menu');
    const gameContainer = document.getElementById('game-container');
    const ball = document.getElementById('ball');
    const scoreElement = document.getElementById('score');
    
    let gameActive = false;
    let score = 0;
    let posX = window.innerWidth / 2 - 40;
    let posY = 0;
    let speedY = 0;
    let speedX = 0;
    const gravity = 0.45;

    function startGame() {
        menu.style.display = 'none';
        gameContainer.style.display = 'block';
        resetGame();
        gameActive = true;
        update();
    }

    function resetGame() {
        score = 0;
        scoreElement.innerText = score;
        posX = window.innerWidth / 2 - 40;
        posY = 100;
        speedY = 0;
        speedX = 0;
    }

    function update() {
        if (!gameActive) return;

        speedY -= gravity;
        posY += speedY;
        posX += speedX;

        // Bater no chão
        if (posY <= 0) {
            gameActive = false;
            alert("Fim de Jogo! Pontuação: " + score);
            menu.style.display = 'flex';
            gameContainer.style.display = 'none';
            return;
        }

        // Bater nas paredes laterais
        if (posX <= 0 || posX >= window.innerWidth - 80) {
            speedX *= -0.8; // Perde um pouco de força ao bater na parede
            posX = posX <= 0 ? 1 : window.innerWidth - 81;
        }

        ball.style.bottom = posY + "px";
        ball.style.left = posX + "px";

        requestAnimationFrame(update);
    }

    function kick(e) {
        if (!gameActive) return;
        e.preventDefault();
        
        score++;
        scoreElement.innerText = score;
        
        // Impulso para cima
        speedY = 14;
        
        // Cálculo de direção baseado onde clicas na bola (opcional/básico)
        // Se clicar mais à esquerda, ela vai para a direita
        const rect = ball.getBoundingClientRect();
        const clickX = (e.clientX || e.touches[0].clientX) - rect.left;
        speedX = (40 - clickX) * -0.2; 
    }

    // Eventos para PC e Telemóvel
    ball.addEventListener('mousedown', kick);
    ball.addEventListener('touchstart', kick);

</script>
</body>
</html>
